# Web service only. For alert persistence on Render: create a Render Postgres (or any Postgres),
# then add env var DATABASE_URL (Internal Database URL) on this service. Free web dynos use an
# ephemeral disk, so SQLite alone is cleared on restart unless DATABASE_URL is set.
services:
  - type: web
    name: overwatch-alerts
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: PORT
        value: 10000
      - key: NODE_ENV
        value: production
    healthCheckPath: /api/health
    autoDeploy: true
