# Default: Postgres for persistence on Render (free web disk is ephemeral).
# To use SQLite instead on Render, you need a paid plan with a persistent disk:
#   1) Set USE_SQLITE=true (forces SQLite even if DATABASE_URL is present)
#   2) Mount a disk and point SQLITE_PATH at it (uncomment "disk" block below)
databases:
  - name: overwatch-alerts-pg
    databaseName: overwatch_alerts
    user: overwatch_app

services:
  - type: web
    name: overwatch-alerts
    runtime: node
    plan: free
    rootDir: overwatch-alerts
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: PORT
        value: 10000
      - key: NODE_ENV
        value: production
      - key: RETENTION_DAYS
        value: "30"
      - key: PUBLIC_BASE_URL
        value: https://princi-repo.onrender.com
      - key: DATABASE_URL
        fromDatabase:
          name: overwatch-alerts-pg
          property: connectionString
      # SQLite fallback / override (paid plan only — needs disk below):
      # - key: USE_SQLITE
      #   value: "true"
      # - key: SQLITE_PATH
      #   value: /var/data/alerts.db
    # disk:                               # uncomment on paid plans for SQLite persistence
    #   name: overwatch-data
    #   mountPath: /var/data
    #   sizeGB: 1
    healthCheckPath: /api/health
    autoDeploy: true
