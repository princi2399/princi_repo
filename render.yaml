# Blueprint: link a Render Postgres so alerts survive web dyno restarts (free web = ephemeral disk).
# After sync, set your web service root to this folder if the repo root is not overwatch-alerts.
databases:
  - name: overwatch-alerts-pg
    databaseName: overwatch_alerts
    user: overwatch_app

services:
  - type: web
    name: overwatch-alerts
    runtime: node
    plan: free
    rootDir: overwatch-alerts
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: PORT
        value: 10000
      - key: NODE_ENV
        value: production
      - key: RETENTION_DAYS
        value: "30"
      - key: PUBLIC_BASE_URL
        value: https://princi-repo.onrender.com
      - key: DATABASE_URL
        fromDatabase:
          name: overwatch-alerts-pg
          property: connectionString
    healthCheckPath: /api/health
    autoDeploy: true
