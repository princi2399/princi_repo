<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PayU Overwatch — Alerts</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <header class="header">
    <div class="header-inner">
      <div class="header-left">
        <div class="logo">
          <div class="logo-icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2"/><path d="M12 6v6l4 2" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
          </div>
          <span class="logo-text">Overwatch</span>
        </div>
        <div class="connection-status" id="connectionStatus">
          <span class="status-dot"></span>
          <span class="status-text">Connecting...</span>
        </div>
      </div>
      <div class="header-stats">
        <div class="hstat"><span class="hstat-val" id="statTotal">0</span><span class="hstat-lbl">Total</span></div>
        <div class="hstat hstat-ongoing"><span class="hstat-val" id="statOngoing">0</span><span class="hstat-lbl">Ongoing</span></div>
        <div class="hstat hstat-resolved"><span class="hstat-val" id="statResolved">0</span><span class="hstat-lbl">Resolved</span></div>
        <div class="hstat hstat-high"><span class="hstat-val" id="statHigh">0</span><span class="hstat-lbl">High</span></div>
        <div class="hstat hstat-medium"><span class="hstat-val" id="statMedium">0</span><span class="hstat-lbl">Med</span></div>
        <div class="hstat hstat-low"><span class="hstat-val" id="statLow">0</span><span class="hstat-lbl">Low</span></div>
      </div>
      <div class="header-right">
        <button class="btn btn-test" id="btnTestAlert">Send Test Alert</button>
      </div>
    </div>
  </header>

  <main class="main">
    <div class="filters">
      <div class="filter-group">
        <button class="filter-btn active" data-filter="all">All</button>
        <button class="filter-btn" data-filter="ongoing">Ongoing</button>
        <button class="filter-btn" data-filter="resolved">Resolved</button>
      </div>
      <div class="filter-group">
        <button class="filter-btn severity-filter active" data-severity="all">All Severity</button>
        <button class="filter-btn severity-filter high" data-severity="HIGH">High</button>
        <button class="filter-btn severity-filter medium" data-severity="MEDIUM">Medium</button>
        <button class="filter-btn severity-filter low" data-severity="LOW">Low</button>
      </div>
      <div class="filter-group">
        <button class="filter-btn entity-filter active" data-entity="all">All Types</button>
        <button class="filter-btn entity-filter" data-entity="merchant">Merchant</button>
        <button class="filter-btn entity-filter" data-entity="acquirer">Acquirer</button>
        <button class="filter-btn entity-filter" data-entity="issuer">Issuer</button>
        <button class="filter-btn entity-filter" data-entity="card_scheme">Scheme</button>
      </div>
      <span class="alert-count" id="alertCount">0 alerts</span>
    </div>

    <div class="alerts-list" id="alertsList">
      <div class="empty-state" id="emptyState">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none"><path d="M12 22c1.1 0 2-.9 2-2h-4a2 2 0 002 2zm6-6v-5c0-3.07-1.63-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.64 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z" fill="currentColor" opacity="0.2"/></svg>
        <p>No alerts yet. Send a test alert or POST to <code>/webhook/overwatch</code></p>
      </div>
    </div>
  </main>

  <script src="/app.js"></script>
</body>
</html>
